{% extends 'main.html' %} {% load static %} {% block content %}

<h2>{{ user.username }}'s Profile Page</h2>

<p>Courses</p>
{% for course in courses %}
<p>{{ course }}</p>
{% endfor %}

<!-- Only shows the user's reviews -->
{% if request.user == user %}
<p>Your Reviews</p>
<!-- Put all reviews that user has made here -->
<!-- Add way to remove reviews -->

<!-- Edit Profile Info -->
<a href="{% url 'edit-profile' user %}">Edit</a>
{% endif %} 

{% endblock content %}
