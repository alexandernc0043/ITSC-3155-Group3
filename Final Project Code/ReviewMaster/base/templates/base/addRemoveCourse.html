{% extends 'main.html' %}

{% block content %}
    <form action="" method="post">

        {% csrf_token %}
        {% if remove %}
            <p>Do you want to remove "{{ course.course_name }} | {{ course }}"</p>
        {% else %}
            <p>Do you want to add "{{ course.course_name }} | {{ course }}"</p>
        {% endif %}
        <button type="submit">Confirm</button>
        <!-- Goes back to previous page stored in meta, works here but will not work in views -->
        <a href="{{request.META.HTTP_REFERER}}">Go Back</a> 

    </form>

{% endblock content %}
